<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>陳樵國語文</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', system-ui, sans-serif;
    }
    .option-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0.5rem;
      font-size: 0.9rem;
      min-height: 40px;
      display: flex;
      align-items: center;
    }
    .option-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: fall 3s linear forwards;
    }
    @keyframes fall {
      to {
        transform: translateY(800px) rotate(720deg);
        opacity: 0;
      }
    }
    #quiz-container {
      max-height: 80vh;
      overflow-y: auto;
      padding: 1rem;
    }
    #timer {
      font-size: 1.5rem;
    }
    .question {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .feedback {
      padding: 0.5rem;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    .feedback p {
      font-size: 1rem;
    }
    h1 {
      font-size: 2rem;
    }
    .leaderboard-row:hover {
      background-color: #f1f5f9;
    }
    .leaderboard-row.current-user {
      background-color: #dbeafe;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-rose-50 min-h-screen pb-12">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-4xl font-bold text-indigo-700">🎓陳樵</h3>
      <div class="flex gap-3" id="header-buttons">
        <button onclick="showLeaderboard()" class="px-3 py-2 bg-white rounded-2xl shadow text-indigo-600 hover:bg-indigo-50 text-sm w-24">排行榜</button>
        <button onclick="exitProgram()" class="px-3 py-2 bg-white rounded-2xl shadow text-red-600 hover:bg-red-50 text-sm w-24">結束</button>
      </div>
    </div>
    <div id="quiz-container" class="bg-white rounded-3xl shadow-2xl min-h-[520px]"></div>
  </div>

  <script>
    // ===== 全域變數 =====
    let allQuestions = [];
    let questions = [];
    let wrongQuestions = [];
    let current = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 30;
    let username = '';
    let currentUnit = ''; // ✅ 修正：宣告 currentUnit 全域變數

    // ===== 載入題目 =====
    async function loadQuestions() {
      try {
        const res = await fetch('questions-unit.json');
        allQuestions = await res.json();
        showWelcomeScreen();
      } catch (e) {
        document.getElementById('quiz-container').innerHTML =
          `<div class="text-center py-20 text-red-600"><p class="text-2xl">❌ 無法載入題目</p></div>`;
      }
    }

    // ===== 歡迎畫面（登入） =====
    function showWelcomeScreen() {
      updateHeaderButtons(true);
      document.getElementById('quiz-container').innerHTML = `
        <div class="text-center py-16">
          <div class="text-7xl mb-6">📝</div>
          <h3 class="text-4xl font-bold text-indigo-700 mb-3">六年級國語文</h3>
          <p class="text-xl text-gray-600 mb-10">綜合練習</p>
          <div class="mb-4">
            <input id="username" type="text" placeholder="帳號" class="px-4 py-2 border border-gray-300 rounded-md">
          </div>
          <button onclick="login()" class="w-full py-5 bg-gradient-to-r from-indigo-600 to-violet-600 text-white text-2xl font-medium rounded-3xl shadow-xl">登入</button>
        </div>
      `;
    }

    // ===== 登入 =====
    function login() {
      const input = document.getElementById('username');
      if (!input) return;
      username = input.value.trim();
      if (username) {
        alert(`登入成功！歡迎 ${username}`);
        showUnitSelection();
      } else {
        alert('請輸入帳號');
      }
    }

    // ===== 更新 Header 按鈕 =====
    function updateHeaderButtons(isMainPage) {
      const container = document.getElementById('header-buttons');
      if (!container) return;
      if (isMainPage) {
        container.innerHTML = `
          <button onclick="showLeaderboard()" class="px-3 py-2 bg-white rounded-2xl shadow text-indigo-600 hover:bg-indigo-50 text-sm w-24">排行榜</button>
          <button onclick="exitProgram()" class="px-3 py-2 bg-white rounded-2xl shadow text-red-600 hover:bg-red-50 text-sm w-24">結束</button>
        `;
      } else {
        container.innerHTML = `
          <button onclick="exitProgram()" class="px-3 py-2 bg-white rounded-2xl shadow text-red-600 hover:bg-red-50 text-sm w-24">結束</button>
        `;
      }
    }

    // ===== 結束 / 回首頁 =====
    function exitProgram() {
      if (confirm('確定結束程式嗎？')) window.close();
    }

    function goHome() {
      if (confirm('返回主頁？')) location.reload();
    }

    // ===== 單元選擇 =====
    function showUnitSelection() {
      updateHeaderButtons(false);
      let html = `<div class="text-center py-8"><h2 class="text-3xl font-bold mb-8">請選擇測驗單元</h2>`;
      html += `<div class="max-w-xs mx-auto mb-8"><div class="flex gap-3">
        <input id="unitInput" type="number" min="1" max="40" placeholder="輸入單元" class="flex-1 px-5 py-4 border border-gray-300 rounded-2xl text-center text-xl">
        <button onclick="startCustomUnit()" class="px-8 bg-indigo-600 text-white rounded-2xl">開始</button>
      </div></div>`;
      html += `<div class="grid grid-cols-5 gap-3">`;
      for (let i = 1; i <= 40; i++) {
        html +=
          `<button onclick="startUnit(${i})" class="py-5 bg-white hover:bg-indigo-50 border border-gray-200 rounded-2xl font-medium">單元 ${i.toString().padStart(2, '0')}</button>`;
      }
      html += `</div>`;
      // 加一個「全部單元」的按鈕（選用）
      html +=
        `<button onclick="startAllUnits()" class="mt-6 w-full py-5 bg-gradient-to-r from-amber-400 to-orange-400 text-white text-xl font-medium rounded-3xl shadow-xl">📚 全部單元混合</button>`;
      html += `</div>`;
      document.getElementById('quiz-container').innerHTML = html;
    }

    // ===== 自訂單元 =====
    function startCustomUnit() {
      const input = document.getElementById('unitInput');
      if (!input) return;
      const num = parseInt(input.value);
      if (isNaN(num) || num < 1 || num > 40) return alert('請輸入 1~40 的單元！');
      startUnit(num);
    }

    // ===== 開始指定單元 =====
    function startUnit(unitNumber) {
      const filtered = allQuestions.filter(q => q.unit === unitNumber);
      if (filtered.length === 0) return alert('此單元尚無題目');
      questions = shuffle(filtered);
      currentUnit = unitNumber; // ✅ 設定目前單元
      current = 0;
      score = 0;
      wrongQuestions = [];
      updateHeaderButtons(false);
      loadQuestion();
    }

    // ===== 全部單元混合 =====
    function startAllUnits() {
      if (allQuestions.length === 0) return alert('尚無題目');
      questions = shuffle([...allQuestions]);
      currentUnit = '全'; // ✅ 設定為「全」
      current = 0;
      score = 0;
      wrongQuestions = [];
      updateHeaderButtons(false);
      loadQuestion();
    }

    // ===== 工具函式 =====
    function shuffle(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function getShuffledOptions(q) {
      const shuffled = shuffle([...q.options]);
      const correctIndex = shuffled.indexOf(q.options[q.answer]);
      return { shuffledOptions: shuffled, correctIndex };
    }

    function playSound(isCorrect) {
      try {
        const ctx = new(window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = isCorrect ? 'sine' : 'sawtooth';
        osc.frequency.setValueAtTime(isCorrect ? 880 : 420, ctx.currentTime);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (isCorrect ? 0.5 : 0.7));
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + (isCorrect ? 0.6 : 0.9));
      } catch (e) {}
    }

    function createConfetti() {
      for (let i = 0; i < 100; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#6366f1', '#a855f7', '#ec4899', '#eab308', '#22c55e'][Math.floor(Math.random() * 5)];
        c.style.animationDuration = (Math.random() * 2.5 + 2.5) + 's';
        c.style.top = '0';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }
    }

    // ===== 載入題目（核心） =====
    function loadQuestion() {
      clearInterval(timerInterval);
      if (!questions || questions.length === 0) {
        showResult();
        return;
      }
      const q = questions[current];
      if (!q) {
        showResult();
        return;
      }
      const { shuffledOptions, correctIndex } = getShuffledOptions(q);
      q.currentCorrectIndex = correctIndex;

      document.getElementById('quiz-container').innerHTML = `
        <div class="flex justify-between mb-6 text-sm font-medium">
          <span>單元 ${q.unit} • 第 <span id="q-number">${current+1}</span> / ${questions.length}</span>
          <span id="timer" class="font-mono text-orange-600">30</span>
        </div>
        <div class="h-2 bg-gray-100 rounded-full mb-8 overflow-hidden">
          <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 transition-all" style="width:0%"></div>
        </div>
        <div class="question text-2xl font-medium leading-relaxed mb-2">${current + 1}. ${q.question}</div>
        <div class="grid grid-cols-1 gap-2">
          ${shuffledOptions.map((opt,i) => `
            <button onclick="selectAnswer(${i})" class="option-btn w-full text-left px-8 py-4 bg-gradient-to-r from-gray-50 to-white hover:from-indigo-50 border border-gray-200 rounded-3xl text-xl shadow">
              ${String.fromCharCode(65+i)}. ${opt}
            </button>`).join('')}
        </div>
        <div id="feedback" class="mt-4 hidden"></div>
      `;
      updateProgress();
      startTimer();
    }

    // ===== 選擇答案 =====
    window.selectAnswer = function(selected) {
      clearInterval(timerInterval);
      const q = questions[current];
      if (!q) return;
      const isCorrect = selected === q.currentCorrectIndex;
      if (isCorrect) {
        score++;
        playSound(true);
        createConfetti();
      } else {
        if (!wrongQuestions.some(w => w.id === q.id && w.unit === q.unit)) {
          wrongQuestions.push({ ...q });
        }
        playSound(false);
      }

      const feedback = document.getElementById('feedback');
      if (!feedback) return;
      feedback.classList.remove('hidden');
      feedback.innerHTML = `
        <div class="p-4 rounded-3xl ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
          <p class="text-xl font-bold mb-2">${isCorrect ? '🎉 答對了！' : '😔 答錯了'}</p>
          <p class="text-base">${q.explanation || ''}</p>
        </div>
        <button onclick="nextQuestion()" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-3xl text-xl font-medium">
          ${current < questions.length-1 ? '下一題 →' : '查看成績'}
        </button>
      `;
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    };

    // ===== 下一題 =====
    window.nextQuestion = function(timeUp = false) {
      if (timeUp) {
        const q = questions[current];
        if (q && !wrongQuestions.some(w => w.id === q.id && w.unit === q.unit)) {
          wrongQuestions.push({ ...q });
        }
      }
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    };

    // ===== 計時器 =====
    function startTimer() {
      timeLeft = 30;
      const timerEl = document.getElementById('timer');
      if (timerEl) timerEl.textContent = timeLeft;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('timer');
        if (el) {
          el.textContent = timeLeft;
          if (timeLeft <= 5) el.classList.add('text-red-600');
        }
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          nextQuestion(true);
        }
      }, 1000);
    }

    // ===== 更新進度 =====
    function updateProgress() {
      const progress = questions.length > 0 ? (current / questions.length) * 100 : 0;
      const bar = document.getElementById('progress-bar');
      if (bar) bar.style.width = `${progress}%`;
    }

    // ===== 儲存高分 =====
    function saveHighScore(scorePercent) {
      const highScores = JSON.parse(localStorage.getItem('idiomHighScores') || '[]');
      const unitLabel = currentUnit || '全';
      const entry = {
        username: username || '訪客',
        score: scorePercent,
        unit: unitLabel,
        date: new Date().toLocaleDateString('zh-TW')
      };
      highScores.push(entry);
      highScores.sort((a, b) => b.score - a.score);
      // 只保留最近 100 筆，避免過大
      if (highScores.length > 100) highScores.length = 100;
      localStorage.setItem('idiomHighScores', JSON.stringify(highScores));
    }

    // ===== 🏆 顯示排行榜（修復核心問題） =====
    window.showLeaderboard = function() {
      const highScores = JSON.parse(localStorage.getItem('idiomHighScores') || '[]');

      if (highScores.length === 0) {
        document.getElementById('quiz-container').innerHTML = `
          <div class="text-center py-16">
            <div class="text-7xl mb-6">📊</div>
            <h3 class="text-3xl font-bold text-gray-700 mb-4">尚無成績紀錄</h3>
            <p class="text-gray-500 mb-8">快來完成測驗，登上排行榜吧！</p>
            <button onclick="showUnitSelection()" class="px-8 py-4 bg-indigo-600 text-white text-xl rounded-3xl shadow-xl">返回單元選擇</button>
          </div>
        `;
        return;
      }

      let html = `
        <div class="py-4">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-3xl font-bold text-indigo-700">🏆 排行榜</h2>
            <span class="text-sm text-gray-500">共 ${highScores.length} 筆</span>
          </div>
          <div class="overflow-x-auto rounded-2xl border border-gray-200">
            <table class="w-full text-sm">
              <thead class="bg-indigo-100 text-indigo-800">
                <tr>
                  <th class="px-4 py-3 text-left">#</th>
                  <th class="px-4 py-3 text-left">使用者</th>
                  <th class="px-4 py-3 text-left">單元</th>
                  <th class="px-4 py-3 text-left">分數</th>
                  <th class="px-4 py-3 text-left">日期</th>
                </tr>
              </thead>
              <tbody>
      `;

      const currentUser = username || '訪客';
      highScores.forEach((entry, index) => {
        const isCurrentUser = entry.username === currentUser;
        const rank = index + 1;
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
        html += `
          <tr class="leaderboard-row ${isCurrentUser ? 'current-user' : ''} border-b border-gray-100">
            <td class="px-4 py-3">${medal}</td>
            <td class="px-4 py-3">${escapeHtml(entry.username)} ${isCurrentUser ? '⭐' : ''}</td>
            <td class="px-4 py-3">${entry.unit}</td>
            <td class="px-4 py-3 font-bold text-indigo-600">${entry.score}%</td>
            <td class="px-4 py-3 text-gray-500">${entry.date || ''}</td>
          </tr>
        `;
      });

      html += `
              </tbody>
            </table>
          </div>
          <div class="mt-6 flex flex-wrap gap-3 justify-center">
            <button onclick="showUnitSelection()" class="px-6 py-3 bg-indigo-600 text-white rounded-3xl shadow-xl hover:bg-indigo-700">📖 返回單元選擇</button>
            <button onclick="goHome()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-3xl shadow hover:bg-gray-300">🏠 回到主頁</button>
          </div>
        </div>
      `;

      document.getElementById('quiz-container').innerHTML = html;
    };

    // ===== 簡單防 XSS =====
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== 顯示結果 =====
    function showResult() {
      const percentage = questions.length > 0 ? Math.round((score / questions.length) * 100) : 0;
      saveHighScore(percentage);

      let html = `<div class="text-center py-12">
        <div class="text-8xl mb-6">${percentage >= 80 ? '🏆' : '🎖️'}</div>
        <h2 class="text-4xl font-bold mb-3">測驗完成！</h2>
        <p class="text-7xl font-bold text-indigo-600">${score}/${questions.length}</p>
        <p class="text-3xl text-gray-600">${percentage}% 正確率</p>`;

      if (wrongQuestions.length > 0) {
        html +=
          `<button onclick="startReview()" class="mt-8 w-full py-6 bg-orange-500 text-white rounded-3xl text-2xl">重練錯題 (${wrongQuestions.length}題)</button>`;
      }
      html +=
        `<button onclick="goHome()" class="mt-4 w-full py-6 bg-indigo-600 text-white rounded-3xl text-2xl">回到主頁</button>`;
      html +=
        `<button onclick="showLeaderboard()" class="mt-4 w-full py-6 bg-green-600 text-white rounded-3xl text-2xl">🏆 查看成績</button>`;
      html += `</div>`;

      document.getElementById('quiz-container').innerHTML = html;
    }

    // ===== 錯題重練 =====
    window.startReview = function() {
      if (wrongQuestions.length === 0) {
        alert('沒有錯題需要重練！');
        return;
      }
      questions = shuffle([...wrongQuestions]);
      currentUnit = '錯題';
      current = 0;
      score = 0;
      // 清空 wrongQuestions 以便重新記錄
      wrongQuestions = [];
      updateHeaderButtons(false);
      loadQuestion();
    };

    // ===== 啟動 =====
    window.onload = loadQuestions;
  </script>
</body>
</html>
